<div class="login-container">
  <h2>Set new password</h2>
  <form *ngIf="token" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="password">New password</label>
      <input type="password" id="password" formControlName="password" placeholder="At least 6 characters">
    </div>
    <div class="form-group">
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="Repeat password">
    </div>
    <p *ngIf="form.hasError('mismatch') && form.get('confirmPassword')?.touched" class="error">Passwords do not match.</p>
    <button type="submit" [disabled]="!form.valid || loading">
      {{ loading ? 'Resetting...' : 'Reset password' }}
    </button>
  </form>
  <p *ngIf="message" [class.error]="isError" [class.success]="!isError">{{ message }}</p>
  <p><a routerLink="/login">Back to login</a></p>
</div>
