<div class="login-container">
  <h2>Forgot password</h2>
  <p class="hint">Enter your email and we'll send you a link to reset your password.</p>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" placeholder="your@email.com">
    </div>
    <button type="submit" [disabled]="!form.valid || loading">
      {{ loading ? 'Sending...' : 'Send reset link' }}
    </button>
  </form>
  <p *ngIf="message" [class.error]="isError" [class.success]="!isError">{{ message }}</p>
  <p><a routerLink="/login">Back to login</a></p>
</div>
